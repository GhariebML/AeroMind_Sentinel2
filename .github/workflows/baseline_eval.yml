name: AeroMind Sentinel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install linter
        run: pip install ruff
      - name: Run lint
        run: ruff check src/ scripts/ tests/ dashboard/ --ignore E501

  test-and-eval:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: pytest tests/ -v --cov=src --tb=short

      - name: Prepare results directory
        run: mkdir -p results experiments/results

      - name: Run Baseline Evaluation
        run: |
          python scripts/evaluate.py --scenario all --mock --output results/current_eval.json

      - name: Check Regression
        run: |
          python -c "
          import json, sys
          with open('results/current_eval.json') as f:
              data = json.load(f)
          for scenario, metrics in data.items():
              mota = metrics['rl_optimized']['mota']
              if mota < 0.80:
                  print(f'❌ REGRESSION: {scenario} MOTA={mota:.3f} (<0.800)')
                  sys.exit(1)
              print(f'✅ {scenario} MOTA: {mota:.3f}')
          "
